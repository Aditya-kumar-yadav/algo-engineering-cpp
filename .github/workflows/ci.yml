name: Automated Testing

on:
  push:
    branches:
      - main
    # Only run when files inside the 'src' directory are changed
    paths:
      - 'src/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile and Test
        run: |
          # Find all solution.cpp files within the src directory
          find src -name "solution.cpp" | while read sol; do
            dir=$(dirname "$sol")
            test_file="$dir/tests.txt"
            
            # Check if a corresponding tests.txt exists
            if [ -f "$test_file" ]; then
              echo "-----------------------------------"
              echo "Testing: $sol"
              
              # Compile the solution
              if g++ -O2 "$sol" -o solution; then
                # Run the solution against the test file
                ./solution < "$test_file"
                
                # Check for runtime errors
                if [ $? -eq 0 ]; then
                  echo "SUCCESS: $sol passed."
                else
                  echo "ERROR: Runtime failure for $sol"
                  exit 1
                fi
              else
                echo "ERROR: Compilation failed for $sol"
                exit 1
              fi
            else
              echo "SKIP: No tests.txt found for $sol"
            fi
          done
