name: Enterprise CI/CD Pipeline

on:
  push:
    branches: [ "main", "v2-enterprise-architecture", "v2" ]
  pull_request:
    branches: [ "main" ]
    
jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    # --- 1. C++ ENVIRONMENT SETUP ---
    - name: Install C++ dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential

    # --- 2. PYTHON AUTOMATION & GATEKEEPER ---
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Run Metadata Auto-Discovery (Security Check)
      # This acts as your bouncer. If a duplicate ID is found, the script crashes and fails the PR!
      run: python scripts/auto_discover.py

    - name: Test Documentation Generator
      # Ensures your README builder script isn't broken
      run: python scripts/generate_docs.py

    # --- 3. COMPILATION & TESTING ---
    - name: Configure CMake
      run: cmake -B build -S .

    - name: Build Codebase
      run: cmake --build build

    - name: Run Google Tests
      working-directory: build
      run: ctest --output-on-failure
      # --- 4. AUTO-COMMIT GENERATED FILES ---
    - name: Commit and Push Auto-Generated Files
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: auto-update database and documentation [skip ci]"
        file_pattern: metadata/database.json README.md hubs/