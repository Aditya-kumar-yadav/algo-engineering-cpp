name: Enterprise CMake Build & Test

# Run this on pushes to main AND your v2 branch
on:
  push:
    branches: [ "main", "v2-enterprise-architecture", "v2" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install dependencies (CMake and GCC)
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential

    - name: Configure CMake
      # This generates the build files in a new "build" directory
      run: cmake -B build -S .

    - name: Build Codebase
      # This compiles your C++ code and Google Tests
      run: cmake --build build

    - name: Run Google Tests
      # This executes the tests. If they pass, the badge turns green!
      working-directory: build
      run: ctest --output-on-failure
