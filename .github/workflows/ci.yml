name: Automated Testing

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile and Test
        run: |
          find . -name "solution.cpp" | while read sol; do
            dir=$(dirname "$sol")
            input="$dir/tests.txt"
            expected="$dir/expected.txt"
            
            if [ -f "$input" ] && [ -f "$expected" ]; then
              echo "-----------------------------------"
              echo "Testing: $sol"
              g++ -O2 "$sol" -o solution
              
              # Run solution and save output to a temporary file
              ./solution < "$input" > actual_output.txt
              
              # Compare actual output with expected output (ignoring whitespace)
              if diff -w -B actual_output.txt "$expected" > /dev/null; then
                echo "SUCCESS: $sol passed."
              else
                echo "ERROR: Output mismatch for $sol"
                echo "--- Expected Output ---"
                cat "$expected"
                echo "--- Your Code's Output ---"
                cat actual_output.txt
                exit 1
              fi
            else
              echo "SKIP: Missing tests.txt or expected.txt in $dir"
            fi
          done
